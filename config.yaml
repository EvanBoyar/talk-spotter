# Talk Spotter Configuration

# Your callsign - used for all spot posting (DX Cluster, POTA, etc.)
callsign: "N0CALL"

# Radio selection: kiwisdr, rtl_sdr, transceiver
radio: "rtl_sdr"

# KiwiSDR settings
kiwisdr:
  host: "ssi.proxy.kiwisdr.com"  # Find yours at http://rx.linkfanel.net or http://kiwisdr.com/public/
  port: 8073
  frequency: 7218  # kHz
  mode: "lsb"       # usb, lsb, am, cw, nbfm
  max_retries: 0     # 0 = retry forever
  retry_delay: 5     # Initial seconds between attempts (doubles each time, caps at 60s)

# RTL-SDR settings
rtl_sdr:
  frequency: 147420   # kHz
  mode: "nbfm"        # nbfm, usb, lsb, am, fm
  gain: "auto"        # dB or "auto"
  ppm: 0              # Frequency correction
  direct_sampling: 0  # 0=off, 1=I-branch, 2=Q-branch (use 2 for HF)
  agc: false          # Hardware AGC (recommended for HF direct sampling)
  sample_rate: 256000 # Use 960000 for HF, 256000 for VHF/UHF

# Transceiver settings (audio via sound card + optional rig control via Hamlib)
# Requires: pip install soundcard>=0.4.5; rigctld (libhamlib-utils) for CAT control
transceiver:
  frequency: 7275             # Frequency in kHz (0 = use rig's current frequency)
  mode: "lsb"                 # Mode: usb, lsb, am, fm, etc. (empty = use rig's current mode)
  rig_model: 1034             # Hamlib rig model (0 = no CAT, audio only; 1034 = Yaesu FT-DX1200)
  serial_port: ""             # Serial port for CAT (empty = auto-detect digirig CP2102)
  baud_rate: 38400            # CAT baud rate (must match rig setting)
  rigctld_port: 4532          # TCP port for rigctld daemon
  microphone_substring: "USB Audio Device"  # Digirig's CM108 USB audio chip
  samplerate: 48000           # Sound card sample rate
  poll_interval: 5.0          # How often to poll rig for freq/mode changes (seconds)

# Vosk speech recognition settings
vosk:
  model_path:     "vosk-model-small-en-us-0.15" # Small model, default downloaded
  #model_path:    "vosk-model-en-us-0.22" # Normal model, you have to download this one yourself
  sample_rate: 16000

# DX Cluster settings for posting spots
dx_cluster:
  host: "dxc.ve7cc.net"
  port: 23

# POTA (Parks on the Air) settings
pota:
  enabled: true

# SOTA (Summits on the Air) settings
# Run with --sota-login to authenticate (one-time setup)
sota:
  enabled: true

# This is basically just for if you're doing development work.
# To override settings without modifying this file, create config.local.yaml
# with just the values you want to change. Example:
#
#   callsign: "A1CALL"
#   kiwisdr:
#     host: "myserver.proxy.kiwisdr.com"
#
# config.local.yaml is gitignored and will not be committed. 